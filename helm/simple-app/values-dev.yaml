replicaCount: 2

image:
  repository: simple-app
  pullPolicy: Never
  tag: dev

app:
  environment: development

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: simple-app.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
